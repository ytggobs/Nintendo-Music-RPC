name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: --mac
          - os: windows-latest
            platform: --win
          - os: ubuntu-latest
            platform: --linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '26.2.0'

      - name: Install dependencies
        run: npm ci

      - name: Embed HTML
        run: node app/scripts/embed-html.mjs

      - name: Build TypeScript
        run: npx tsc

      - name: Copy assets
        run: node -e "const fs=require('fs');fs.cpSync('app/assets','app/dist/assets',{recursive:true})"

      - name: Package and publish
        run: npx electron-builder ${{ matrix.platform }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false